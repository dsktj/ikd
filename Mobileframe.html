<!-- ══════════════════════════════════════════════════════════════
     MobileFrame.html
     ── Reusable Mobile/Desktop Frame untuk Google Apps Script ──

     CARA PAKAI di file HTML lain:
       1. Pastikan Code.gs punya fungsi include() (lihat Code.gs)
       2. Tambahkan di dalam <head>, SETELAH <style> utama:
              <?= include('MobileFrame') ?>

     Yang disediakan file ini:
       • Meta tag mobile-web-app + apple-mobile-web-app
       • CSS: .is-mobile styles + @media fallback (960px)
         - html/body scroll-lock di mobile
         - .mobile-only  → tampil hanya di mobile
         - .desktop-only → tampil hanya di desktop
         - Override umum: font lebih besar, input lebih tinggi,
           card/panel full-width tanpa border-radius
       • JS: deteksi mobile via User-Agent (jalan SEBELUM render)
         - Tambah class `is-mobile` ke <html> jika mobile
         - Paksa viewport ulang via JS (antisipasi GAS override)
         - Expose window.IS_MOBILE = true/false untuk logic JS lain

     Catatan:
       • File ini TIDAK mengatur layout spesifik app (warna, card
         tertentu, dsb). Tambahkan override sendiri di <style> HTML
         masing-masing menggunakan selector html.is-mobile.
       • Breakpoint default: 960px. Ubah CSS_BREAKPOINT di bawah
         jika perlu berbeda per halaman.
══════════════════════════════════════════════════════════════ -->

<!-- Meta tambahan mobile (apple + android) -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
/* ══════════════════════════════════════════════════════════════
   MOBILE FRAME — BASE STYLES
   Berlaku via class .is-mobile (diset JS) DAN @media sebagai
   fallback untuk GAS iframe yang mengacaukan JS UA detection.
══════════════════════════════════════════════════════════════ */

/* ── Utility: sembunyikan/tampilkan per device ── */
.mobile-only  { display: none; }
.desktop-only { display: block; }

html.is-mobile .mobile-only  { display: block; }
html.is-mobile .desktop-only { display: none; }

/* ── Scroll & overflow lock di mobile ── */
html.is-mobile,
html.is-mobile body {
  overflow-x: hidden !important;
  max-width: 100vw;
  touch-action: pan-y;
}

/* ── Panel / card full layar di mobile ── */
html.is-mobile .frame-panel {
  width: 100vw !important;
  max-width: 100vw !important;
  min-height: 100vh !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  padding: 60px 24px 40px !important;
  display: flex !important;
  flex-direction: column !important;
  justify-content: center !important;
}

/* ── Shell / wrapper full layar di mobile ── */
html.is-mobile .frame-shell {
  align-items: flex-start !important;
  justify-content: flex-start !important;
  min-height: 100vh !important;
}

/* ── Input & tombol lebih besar di mobile (touch-friendly) ── */
html.is-mobile input[type="text"],
html.is-mobile input[type="password"],
html.is-mobile input[type="email"],
html.is-mobile input[type="number"],
html.is-mobile select,
html.is-mobile textarea {
  font-size: 16px !important; /* mencegah auto-zoom iOS */
}

/* ══════════════════════════════════════════════════════════════
   MEDIA QUERY FALLBACK — wajib untuk GAS iframe yang tidak
   mendeteksi .is-mobile via JS (tergantung webview browser)
══════════════════════════════════════════════════════════════ */
@media screen and (max-width: 960px) {
  .mobile-only  { display: block !important; }
  .desktop-only { display: none  !important; }

  html, body {
    overflow-x: hidden !important;
    max-width: 100vw !important;
    touch-action: pan-y !important;
  }

  .frame-panel {
    width: 100vw !important;
    max-width: 100vw !important;
    min-height: 100vh !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    padding: 60px 24px 40px !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
  }

  .frame-shell {
    align-items: flex-start !important;
    justify-content: flex-start !important;
    min-height: 100vh !important;
  }

  input[type="text"],
  input[type="password"],
  input[type="email"],
  input[type="number"],
  select,
  textarea {
    font-size: 16px !important;
  }
}

/* ── Desktop: pastikan utility class desktop-only tetap tampil ── */
html:not(.is-mobile) .desktop-only { display: block; }
html:not(.is-mobile) .mobile-only  { display: none;  }
</style>

<!-- ══════════════════════════════════════════════════════════════
     JS DETEKSI MOBILE
     Dijalankan SEBELUM render (inline, bukan DOMContentLoaded)
     sehingga class .is-mobile sudah ada saat CSS pertama kali
     diterapkan — menghindari flash of unstyled mobile content.
══════════════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  // ── 1. Deteksi via User-Agent ──
  var ua = navigator.userAgent || navigator.vendor || window.opera || '';
  var isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile|tablet/i.test(ua);

  // ── 2. Fallback: screen.width lebih andal dari window.innerWidth
  //       di beberapa GAS webview / in-app browser ──
  if (!isMobile && typeof screen !== 'undefined' && screen.width <= 960) {
    isMobile = true;
  }

  // ── 3. Terapkan class ke <html> ──
  if (isMobile) {
    document.documentElement.classList.add('is-mobile');

    // ── 4. Paksa viewport ulang via JS ──
    //       GAS kadang mengabaikan / menimpa meta viewport di HTML,
    //       sehingga perlu diset ulang dari JS juga.
    var vp = document.querySelector('meta[name="viewport"]');
    if (vp) {
      vp.setAttribute('content',
        'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
    }

    // ── 5. Paksa body tidak bisa scroll horizontal (antisipasi GAS) ──
    document.addEventListener('DOMContentLoaded', function () {
      document.body.style.overflowX = 'hidden';
      document.body.style.maxWidth  = '100vw';
    });
  }

  // ── 6. Expose ke scope global agar JS lain bisa cek IS_MOBILE ──
  window.IS_MOBILE = isMobile;

})();
</script>
